<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>
    <section>
        <h1>Contacts</h1>
        <p id="desc">Lorem ipsum dolor sit amet consectetur, adipisicing eli.</p>
        <form>
            <div>
                <label for="caixa-nome">Nome:</label>
                <input type="text" id="caixa-nome" name="nome" placeholder="Digite seu nome" pattern="[A-Za-z]{10}">
            </div>
            <div>
                <label for="caixa-email">Email:</label>
                <input type="email" id="caixa-email" name="email" placeholder="Digite seu Email" required>
            </div>

            <div>
                <label for="caixa-data">Data da Ocorrencia:</label>
                <input type="date" id="caixa-data" name="data" required>
            </div>

            <div>
                <div>
                    <label for="comentario">Comentario</label>
                </div>
                <div>
                    <textarea name="comentario" id="comentario" rows="5" cols="30" required></textarea>
                </div>
            </div>
            <input type="submit" value="Enviar">
        </form>

    </section>

</body>
</html>
